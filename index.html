<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Playground - 5x5 战场</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: #e0e0e0;
            margin-bottom: 30px;
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        
        .tower-panel {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            min-width: 120px;
        }
        
        .tower-panel h2 {
            color: #e0e0e0;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .tower-item {
            background-color: #383838;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .tower-item:hover {
            background-color: #4a4a4a;
            border-color: #999;
            transform: translateY(-2px);
        }
        
        .tower-item:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        
        .tower-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
        
        .battlefield {
            display: grid;
            grid-template-columns: repeat(5, 100px);
            grid-template-rows: repeat(5, 100px);
            gap: 2px;
            background-color: #333;
            padding: 2px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .cell {
            background-color: #2d2d2d;
            border: 2px solid #666;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cell:hover {
            background-color: #383838;
            border-color: #999;
        }
        
        .cell.hovering {
            background-color: #4a4a4a;
            border-color: #ccc;
            transform: scale(1.02);
        }
        
        .turret {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: turretIdle 2s infinite ease-in-out;
        }
        
        .turret img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        @keyframes turretIdle {
            0%, 100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }
        
        .bullet {
            position: absolute;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 100;
        }
        
        .bullet img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        button {
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .status {
            color: #e0e0e0;
            font-size: 18px;
        }
    </style>
</head>
